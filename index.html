<script type="text/babel" data-presets="react">
(() => {

// the next topic types in. Exports window.CodeRotator.

    ],

      [["    return ", "k"], ["[", "x"]],

      [["    if ", "k"], ["event[", "x"], ['"type"', "s"], ["] ", "x"], ["not in ", "k"], ["counts:", "x"]],
      [["        counts[event[", "x"], ['"type"', "s"], ["]] = ", "x"], ["0", "n"]],

    ],

      [["from ", "k"], ["collections ", "x"], ["import ", "k"], ["Counter", "t"]],
      [["counts = ", "x"], ["Counter", "t"], ["(event.type ", "x"], ["for ", "k"], ["event ", "x"], ["in ", "k"], ["events)", "x"]],
    ],

const HD_GLOBAL_MAX = HD_TOPICS.reduce((m, t) => Math.max(m, t.nb.length, t.pr.length), 0);

function hdLineLen(line) { return line.reduce((a, [tx]) => a + tx.length, 0); }

function hdRenderUpTo(line, n) {
  let rem = n; const out = [];
  for (let j = 0; j < line.length; j++) {
    const [tx, k] = line[j];
    if (rem <= 0) break;
    const slice = rem >= tx.length ? tx : tx.slice(0, rem);
    out.push(<span key={j} style={{ color: HDC[k] || HDC.x, whiteSpace: "pre" }}>{slice}</span>);
    rem -= tx.length;
  }
  return out;
}

function HDPane({ kind, file, lines, lineIdx, chars, phase, accent, fs = 12, lh = 21, frosted = false }) {
  const isNb = kind === "nb";
  const tone = isNb ? "#E6B450" : "#46C98B";
  const toneSoft = isNb ? "rgba(230,180,80,.09)" : "rgba(70,201,139,.09)";
  const typing = phase === "typing";
  const big = fs >= 13.5;
  const headFs = big ? 11 : 10;
  const fileFs = big ? 12 : 10.5;
  const verdictFs = big ? 12 : 10.5;
  const codePad = big ? "17px 20px 16px" : "13px 15px 12px";

  return (
    <div className="home-pane" style={{
      flex: 1, minWidth: 0,
      background: frosted ? "rgba(20,24,31,.5)" : "#0A0D12",
      backdropFilter: frosted ? "blur(22px) saturate(135%)" : "none",
      WebkitBackdropFilter: frosted ? "blur(22px) saturate(135%)" : "none",
      border: `1px solid ${frosted ? "rgba(255,255,255,.14)" : "rgba(255,255,255,.09)"}`, borderRadius: 12, overflow: "hidden",
      display: "flex", flexDirection: "column",
      boxShadow: frosted
        ? "0 34px 80px -34px rgba(0,0,0,.7), inset 0 1px 0 rgba(255,255,255,.09)"
        : "0 22px 50px -28px rgba(0,0,0,.8)",
    }}>
      {/* header */}
      <div style={{
        display: "flex", alignItems: "center", justifyContent: "space-between",
        padding: big ? "11px 16px" : "9px 13px", borderBottom: "1px solid rgba(255,255,255,.06)", background: "rgba(255,255,255,.02)",
      }}>
        <span style={{ display: "flex", alignItems: "center", gap: 7 }}>
          <span style={{ width: 7, height: 7, borderRadius: "50%", background: tone, flexShrink: 0 }}></span>
          <span style={{ fontFamily: "var(--mono)", fontSize: headFs, fontWeight: 600, letterSpacing: ".15em", color: tone }}>
            {isNb ? "NOTEBOOK" : "PRODUCTION"}
          </span>
        </span>
        <span style={{ fontFamily: "var(--mono)", fontSize: fileFs, color: "#5A636F" }}>
          {isNb ? "untitled.ipynb" : file}
        </span>
      </div>

      {/* code */}
      <div className="hd-code" style={{
        padding: codePad, fontFamily: "var(--mono)", fontSize: "var(--hd-code-fs, 13px)", lineHeight: 1.78,
        transition: "opacity .38s ease", opacity: phase === "erasing" ? 0 : 1,
      }}>
        {Array.from({ length: HD_GLOBAL_MAX }).map((_, i) => {
          const line = lines[i];
          let content = null, caret = false;
          if (line) {
            if (typing) {
              if (i < lineIdx) content = hdRenderUpTo(line, hdLineLen(line));
              else if (i === lineIdx) { content = hdRenderUpTo(line, chars); caret = true; }
            } else {
              content = hdRenderUpTo(line, hdLineLen(line));
            }
          }
          return (
            <div key={i} style={{ whiteSpace: "nowrap", height: "1.78em", overflow: "hidden" }}>
              {content}
              {caret && <span style={{ display: "inline-block", width: "0.55em", height: "1.12em", background: tone, marginLeft: 1, verticalAlign: "text-bottom", animation: "hd-blink 1s step-end infinite" }}></span>}
            </div>
          );
        })}
      </div>

      {/* verdict */}
      <div style={{
        marginTop: "auto", display: "flex", alignItems: "center", gap: 7,
        padding: big ? "11px 16px" : "9px 14px", borderTop: "1px solid rgba(255,255,255,.06)", background: toneSoft, whiteSpace: "nowrap",
      }}>
        <span style={{ fontFamily: "var(--mono)", fontSize: verdictFs, color: tone, letterSpacing: ".01em" }}>
          {isNb ? "✗ stuck in a cell" : "✓ tested · importable"}
        </span>
      </div>
    </div>
  );
}

function CodeRotator({ motion = true, accent = "#3566B5", fs = 12, lh = 21, frosted = false }) {
  const [topic, setTopic] = useStateHD(0);
  const [lineIdx, setLineIdx] = useStateHD(0);
  const [chars, setChars] = useStateHD(0);
  const [phase, setPhase] = useStateHD("typing"); // typing | hold | erasing
  const cur = HD_TOPICS[topic];
  const maxLines = Math.max(cur.nb.length, cur.pr.length);

  useEffectHD(() => {
    const reduce = window.matchMedia && matchMedia("(prefers-reduced-motion: reduce)").matches;
    let timer;
    if (!motion || reduce) {
      setPhase("hold"); setLineIdx(maxLines); setChars(0);
      timer = setTimeout(() => setTopic((t) => (t + 1) % HD_TOPICS.length), 4200);
      return () => clearTimeout(timer);
    }
    setPhase("typing"); setLineIdx(0); setChars(0);
    let li = 0, ch = 0;
    const tick = () => {
      const nbLen = cur.nb[li] ? hdLineLen(cur.nb[li]) : 0;
      const prLen = cur.pr[li] ? hdLineLen(cur.pr[li]) : 0;
      const target = Math.max(nbLen, prLen, 1);
      ch += 2;
      if (ch >= target) {
        li += 1; ch = 0;
        setLineIdx(li); setChars(0);
        if (li >= maxLines) {
          setPhase("hold");
          timer = setTimeout(() => {
            setPhase("erasing");
            timer = setTimeout(() => setTopic((t) => (t + 1) % HD_TOPICS.length), 620);
          }, 3400);
          return;
        }
        timer = setTimeout(tick, 260);
      } else {
        setChars(ch); setLineIdx(li);
        timer = setTimeout(tick, 48);
      }
    };
    timer = setTimeout(tick, 600);
    return () => clearTimeout(timer);
  }, [topic, motion]);

  return (
    <div style={{ width: "100%", textAlign: "left" }}>
      <style>{`@keyframes hd-blink{0%,49%{opacity:1}50%,100%{opacity:0}}
        @keyframes hd-chip{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}`}</style>

      {/* task chip + progress dots */}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: fs >= 13.5 ? 18 : 14, gap: 12 }}>
        <span key={topic} style={{
          display: "inline-flex", alignItems: "center", gap: 8, maxWidth: "100%",
          background: "rgba(255,255,255,.04)", border: "1px solid rgba(255,255,255,.10)", borderRadius: 999,
          padding: fs >= 13.5 ? "7px 16px" : "6px 14px", fontFamily: "var(--mono)", fontSize: fs >= 13.5 ? 13 : 12, color: "#C7CDD6", whiteSpace: "nowrap",
          animation: "hd-chip .42s cubic-bezier(.2,.7,.2,1) both",
        }}>
          <span style={{ color: "#E7EAF0", overflow: "hidden", textOverflow: "ellipsis" }}>{cur.title}</span>
        </span>
        <span style={{ display: "flex", gap: 6, flexShrink: 0 }}>
          {HD_TOPICS.map((_, i) => (
            <span key={i} style={{
              width: 6, height: 6, borderRadius: "50%",
              background: i === topic ? accent : "rgba(255,255,255,.16)", transition: "background .3s",
            }}></span>
          ))}
        </span>
      </div>

      {/* the two panes */}
      <div className="home-panes" style={{ display: "flex", gap: fs >= 13.5 ? 20 : 16, alignItems: "stretch" }}>
        <HDPane kind="nb" file={cur.file} lines={cur.nb} lineIdx={lineIdx} chars={chars} phase={phase} accent={accent} fs={fs} lh={lh} frosted={frosted} />
        <HDPane kind="pr" file={cur.file} lines={cur.pr} lineIdx={lineIdx} chars={chars} phase={phase} accent={accent} fs={fs} lh={lh} frosted={frosted} />
      </div>
    </div>
  );
}

Object.assign(window, { CodeRotator, HD_TOPICS });
// Home / landing page for "Python for DS".
// Clean dark hero: slogan + value prop + "Get Started" on the left, the animated
// Notebook-vs-Production code rotator on the right. "Get Started" forwards an
// already-signed-in visitor straight to the app; otherwise it routes to sign-up.
// Exports window.HomeLanding.
const { useState: useStateHL } = React;

function HomeLanding({ accent = "#3566B5", motion = true, headline, layout = "centered", panel = "solid" }) {
  const sb = typeof window !== "undefined" ? window.__sb : null;
  const afterAuth = typeof window !== "undefined" ? window.__afterAuth : "";
  const signupHref = (typeof window !== "undefined" && window.__hrefs && window.__hrefs.signup) || "Python%20for%20DS%20-%20Sign%20Up.html";
  const signinHref = (typeof window !== "undefined" && window.__hrefs && window.__hrefs.signin) || "Python%20for%20DS%20-%20Sign%20In.html";
  const [busy, setBusy] = useStateHL(false);

  // accent helpers
  const aR = (a) => {
    const h = accent.replace("#", "");
    const r = parseInt(h.slice(0, 2), 16), g = parseInt(h.slice(2, 4), 16), b = parseInt(h.slice(4, 6), 16);
    return `rgba(${r},${g},${b},${a})`;
  };
  const accHi = (() => {
    const h = accent.replace("#", "");
    let r = parseInt(h.slice(0, 2), 16), g = parseInt(h.slice(2, 4), 16), b = parseInt(h.slice(4, 6), 16);
    r = Math.min(255, r + 22); g = Math.min(255, g + 22); b = Math.min(255, b + 22);
    return `rgb(${r},${g},${b})`;
  })();

  function forward(session) {
    if (!afterAuth || !session) return false;
    const u = new URL(afterAuth);
    u.searchParams.set("access_token", session.access_token);
    u.searchParams.set("refresh_token", session.refresh_token);
    window.location.href = u.toString();
    return true;
  }

  // Already signed in? jump straight to the app. Otherwise go create an account.
  async function getStarted(e) {
    if (e) e.preventDefault();
    setBusy(true);
    try {
      if (sb) {
        const { data } = await sb.auth.getSession();
        if (data && data.session && forward(data.session)) return;
      }
    } catch (_) { /* fall through to sign-up */ }
    window.location.href = signupHref;
  }

  // shared bits ────────────────────────────────────────────────
  const Logo = (
    <span style={{ display: "inline-flex", alignItems: "center", gap: 9 }}>
      <svg width="26" height="26" viewBox="0 0 48 48" fill="none" strokeLinecap="round" strokeLinejoin="round">
        <path d="M14 13 V35" stroke={accent} strokeWidth="3.8" />
        <rect x="19" y="14" width="17" height="8" rx="2.4" stroke="#E7EAF0" strokeWidth="3" />
        <rect x="19" y="26" width="17" height="8" rx="2.4" stroke="#E7EAF0" strokeWidth="3" />
      </svg>
      <span style={{ fontFamily: "var(--sans)", fontWeight: 600, fontSize: 15, color: "#E7EAF0", letterSpacing: "-.01em", whiteSpace: "nowrap" }}>Python for DS</span>
    </span>
  );
  const Nav = (
    <header style={{ position: "relative", zIndex: 2, display: "flex", alignItems: "center", justifyContent: "space-between", padding: "22px clamp(28px,5vw,96px) 0" }}>
      {Logo}
      <a href={signinHref} className="hl-nav-link" style={{ fontFamily: "var(--sans)", fontSize: 14, fontWeight: 500, color: "#AEB6C2", textDecoration: "none", whiteSpace: "nowrap" }}>Sign In</a>
    </header>
  );
  const Footer = (
    <footer style={{ position: "relative", zIndex: 2, display: "flex", alignItems: "center", justifyContent: "center", borderTop: "1px solid rgba(255,255,255,.07)", padding: "14px clamp(28px,5vw,96px)", flexShrink: 0 }}>
      <span style={{ fontFamily: "var(--sans)", fontSize: 12.5, color: "rgba(231,234,240,.42)", whiteSpace: "nowrap" }}>© 2026 Python for DS</span>
    </footer>
  );
  const Eyebrow = (
    <div style={{ display: "inline-flex", alignItems: "center" }}>
      <span style={{ fontFamily: "var(--mono)", fontSize: 11.5, fontWeight: 500, letterSpacing: ".22em", textTransform: "uppercase", color: "#727B88", whiteSpace: "nowrap" }}>Python for Data Scientists</span>
    </div>
  );
  const Glows = (
    <React.Fragment>
      <div style={{ position: "absolute", inset: 0, pointerEvents: "none", background: `radial-gradient(72% 56% at 50% 6%, ${aR(.15)} 0%, transparent 60%)` }}></div>
      <div style={{ position: "absolute", inset: 0, pointerEvents: "none", background: `radial-gradient(48% 42% at 50% 62%, ${aR(.13)} 0%, transparent 70%)` }}></div>
      <div style={{ position: "absolute", inset: 0, pointerEvents: "none", background: "radial-gradient(60% 60% at 50% 104%, rgba(255,255,255,.045) 0%, transparent 60%)" }}></div>
    </React.Fragment>
  );
  const sharedCss = `
    .hl-cta{transition:background .15s, box-shadow .15s, transform .05s}
    .hl-cta:hover{background:${accHi};box-shadow:0 16px 40px -14px ${aR(.65)}}
    .hl-cta:active{transform:translateY(1px)}
    .hl-link{transition:color .15s, opacity .15s; text-decoration:none}
    .hl-link:hover{opacity:.7}
    .hl-nav-link{transition:color .15s}
    .hl-nav-link:hover{color:#E7EAF0 !important}
    @media (max-width:560px){ .home-panes{flex-direction:column} }
  `;
  const Cta = (extraMargin) => (
    <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 22, marginTop: extraMargin, flexWrap: "wrap" }}>
      <a href={signupHref} onClick={getStarted} className="hl-cta" style={{
        display: "inline-flex", alignItems: "center", gap: 9, height: 54, padding: "0 32px", borderRadius: 13,
        background: accent, color: "#fff", textDecoration: "none", fontFamily: "var(--sans)", fontSize: 16, fontWeight: 600,
        letterSpacing: ".005em", cursor: busy ? "default" : "pointer", opacity: busy ? .75 : 1, whiteSpace: "nowrap",
        boxShadow: `0 14px 34px -16px ${aR(.7)}`,
      }}>
        {busy ? "One sec…" : "Get Started"}
        {!busy && <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14" /><path d="M13 6l6 6-6 6" /></svg>}
      </a>
      <a href={signinHref} className="hl-link" style={{ fontFamily: "var(--sans)", fontSize: 14.5, fontWeight: 500, color: "rgba(231,234,240,.66)", whiteSpace: "nowrap" }}>
        I already have an account
      </a>
    </div>
  );

  // ── CENTERED / minimal layout ──────────────────────────────
  if (layout === "centered") {
    return (
      <div style={{ position: "relative", width: "100%", minHeight: "100%", background: "#0B0D11", overflow: "hidden", display: "flex", flexDirection: "column", fontFamily: "var(--sans)" }}>
        <style>{sharedCss + `
          .hlc-main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
            padding:clamp(10px,1.6vh,24px) clamp(20px,5vw,64px);min-height:0}
          .hlc-demo{width:100%;max-width:1160px;margin:clamp(22px,3.6vh,42px) auto;--hd-code-fs:13px}
          @media (max-width:1280px){ .hlc-demo{--hd-code-fs:12px} }
          @media (max-width:1080px){
            .hlc-main{justify-content:flex-start;overflow-y:auto;padding-top:32px}
            .hlc-demo .home-panes{flex-direction:column}
            .hlc-demo{--hd-code-fs:13px;max-width:560px}
          }
          @media (max-width:600px){ .hlc-demo{--hd-code-fs:12px} }
          @media (max-width:430px){ .hlc-demo{--hd-code-fs:10px} }
        `}</style>
        {Glows}
        {Nav}
        <main className="hlc-main">
          {Eyebrow}
          <h1 style={{ fontFamily: "var(--sans)", fontWeight: 700, fontSize: "clamp(42px,5.2vw,68px)", lineHeight: 1.06, letterSpacing: "-.035em", color: "#fff", margin: "16px 0 0", textWrap: "balance" }}>
            {headline ? headline : <React.Fragment>Stop living in cells.<br />Ship your Python.</React.Fragment>}
          </h1>
          <p style={{ fontFamily: "var(--sans)", fontWeight: 400, fontSize: "clamp(18px,1.9vw,26px)", lineHeight: 1.28, letterSpacing: "-.012em", color: "rgba(231,234,240,.6)", margin: "15px auto 0", maxWidth: 620, textWrap: "balance" }}>
            Learn to write clean, deployable Python.
          </p>
          <div className="hlc-demo">
            <CodeRotator motion={motion} accent={accent} fs={13} lh={24} frosted={panel === "frosted"} />
          </div>
          {Cta(2)}
        </main>
        {Footer}
      </div>
    );
  }

  return (
    <div style={{ position: "relative", width: "100%", minHeight: "100%", background: "#0B0D11", overflow: "hidden", display: "flex", flexDirection: "column", fontFamily: "var(--sans)" }}>
      <style>{`
        .hl-cta{transition:background .15s, box-shadow .15s, transform .05s}
        .hl-cta:hover{background:${accHi};box-shadow:0 16px 40px -14px ${aR(.65)}}
        .hl-cta:active{transform:translateY(1px)}
        .hl-link{transition:color .15s, opacity .15s; text-decoration:none}
        .hl-link:hover{opacity:.7}
        .hl-nav-link{transition:color .15s}
        .hl-nav-link:hover{color:#E7EAF0 !important}
        .hl-main{display:flex;align-items:center;gap:clamp(32px,5vw,88px);flex:1;
          padding:clamp(20px,3vh,40px) clamp(28px,5vw,96px) clamp(24px,3vh,40px);min-height:0}
        .hl-left{flex:0 1 480px;min-width:0}
        .hl-right{flex:1 1 600px;min-width:0;max-width:760px;--hd-code-fs:12.5px}
        .hl-right .home-panes{flex-direction:column}
        @media (max-width:1000px){
          .hl-main{flex-direction:column;align-items:stretch;gap:32px;
            padding:24px clamp(20px,5vw,40px) 36px;overflow-y:auto}
          .hl-left{flex:none}.hl-right{flex:none;max-width:none}
        }
        @media (max-width:560px){
          .home-panes{flex-direction:column}
        }
      `}</style>

      {/* soft accent glows — keep the dark surface from feeling flat, stay clean */}
      <div style={{ position: "absolute", inset: 0, pointerEvents: "none", background: `radial-gradient(70% 60% at 88% 18%, ${aR(.16)} 0%, transparent 62%)` }}></div>
      <div style={{ position: "absolute", inset: 0, pointerEvents: "none", background: "radial-gradient(60% 70% at 6% 96%, rgba(255,255,255,.04) 0%, transparent 60%)" }}></div>

      {/* ── top nav ── */}
      <header style={{ position: "relative", zIndex: 2, display: "flex", alignItems: "center", justifyContent: "space-between", padding: "22px clamp(28px,5vw,96px) 0" }}>
        <span style={{ display: "inline-flex", alignItems: "center", gap: 9 }}>
          <svg width="26" height="26" viewBox="0 0 48 48" fill="none" strokeLinecap="round" strokeLinejoin="round">
            <path d="M14 13 V35" stroke={accent} strokeWidth="3.8" />
            <rect x="19" y="14" width="17" height="8" rx="2.4" stroke="#E7EAF0" strokeWidth="3" />
            <rect x="19" y="26" width="17" height="8" rx="2.4" stroke="#E7EAF0" strokeWidth="3" />
          </svg>
          <span style={{ fontFamily: "var(--sans)", fontWeight: 600, fontSize: 15, color: "#E7EAF0", letterSpacing: "-.01em", whiteSpace: "nowrap" }}>Python for DS</span>
        </span>
        <a href={signinHref} className="hl-nav-link" style={{ fontFamily: "var(--sans)", fontSize: 14, fontWeight: 500, color: "#AEB6C2", textDecoration: "none", whiteSpace: "nowrap" }}>Sign In</a>
      </header>

      {/* ── hero ── */}
      <div className="hl-main">
        {/* LEFT — message + CTA */}
        <div className="hl-left">
          <div style={{ display: "inline-flex", alignItems: "center", marginBottom: 22 }}>
            <span style={{ fontFamily: "var(--mono)", fontSize: 11.5, fontWeight: 500, letterSpacing: ".22em", textTransform: "uppercase", color: "#727B88", whiteSpace: "nowrap" }}>Python for Data Scientists</span>
          </div>

          <h1 style={{ fontFamily: "var(--serif)", fontWeight: 500, fontSize: "clamp(40px,4.6vw,66px)", lineHeight: 1.0, letterSpacing: "-.02em", color: "#fff", margin: 0, textWrap: "balance" }}>
            {headline ? headline : <React.Fragment>Stop living in cells.<br />Ship your Python.</React.Fragment>}
          </h1>

          <p style={{ fontFamily: "var(--sans)", fontSize: "clamp(15px,1.15vw,18px)", lineHeight: 1.6, color: "rgba(231,234,240,.74)", margin: "22px 0 0", maxWidth: 460, fontWeight: 400 }}>
            Learn to write real, production-grade Python — built for data scientists who think in notebooks. Turn throwaway cells into clean, tested, deployable code.
          </p>

          <div style={{ display: "flex", alignItems: "center", gap: 22, marginTop: 34, flexWrap: "wrap" }}>
            <a href={signupHref} onClick={getStarted} className="hl-cta" style={{
              display: "inline-flex", alignItems: "center", gap: 9, height: 54, padding: "0 32px", borderRadius: 13,
              background: accent, color: "#fff", textDecoration: "none", fontFamily: "var(--sans)", fontSize: 16, fontWeight: 600,
              letterSpacing: ".005em", cursor: busy ? "default" : "pointer", opacity: busy ? .75 : 1, whiteSpace: "nowrap",
              boxShadow: `0 14px 34px -16px ${aR(.7)}`,
            }}>
              {busy ? "One sec…" : "Get Started"}
              {!busy && <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14" /><path d="M13 6l6 6-6 6" /></svg>}
            </a>
            <a href={signinHref} className="hl-link" style={{ fontFamily: "var(--sans)", fontSize: 14.5, fontWeight: 500, color: "rgba(231,234,240,.66)", whiteSpace: "nowrap" }}>
              I already have an account
            </a>
          </div>
        </div>

        {/* RIGHT — animated notebook-vs-production demo */}
        <div className="hl-right">
          <CodeRotator motion={motion} accent={accent} frosted={panel === "frosted"} />
        </div>
      </div>

      {/* ── footer ── */}
      <footer style={{ position: "relative", zIndex: 2, display: "flex", alignItems: "center", justifyContent: "center", borderTop: "1px solid rgba(255,255,255,.07)", padding: "14px clamp(28px,5vw,96px)", flexShrink: 0 }}>
        <span style={{ fontFamily: "var(--sans)", fontSize: 12.5, color: "rgba(231,234,240,.42)", whiteSpace: "nowrap" }}>© 2026 Python for DS</span>
      </footer>
    </div>
  );
}

Object.assign(window, { HomeLanding });

ReactDOM.createRoot(document.getElementById("root")).render(
  <div className="stage">
    <HomeLanding layout="centered" panel="frosted" accent="#3566B5" motion={true} />
  </div>
);
})();
</script>
</body>
</html>
